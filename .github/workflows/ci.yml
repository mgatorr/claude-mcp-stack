name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Validate registry and templates
        run: python3 scripts/validate_registry.py

      - name: Run tests
        run: python3 -m pytest -q

      - name: Secret scan (working tree + git history)
        run: bash scripts/check_no_secrets.sh --history
